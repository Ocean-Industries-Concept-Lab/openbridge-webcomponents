name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-noble
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      LC_NUMERIC: en_US.UTF-8
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: packages/openbridge-webcomponents
      - name: Analyze openbridge-webcomponents
        run: npm run analyze
        working-directory: packages/openbridge-webcomponents
      - name: Build Storybook
        run: npm run build-storybook -- --quiet --test
        working-directory: packages/openbridge-webcomponents
      - name: Serve Storybook and run tests
        run: |
          npx concurrently -k -s first -n "SB,TEST" -c "magenta,blue" \
            "npx http-server storybook-static --port 6006 --silent" \
            "npx wait-on tcp:127.0.0.1:6006 && npm run test-storybook --ci --junit"
        working-directory: packages/openbridge-webcomponents
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: "packages/openbridge-webcomponents/junit.xml"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: packages/openbridge-webcomponents/__snapshots__/__diff_output__
          retention-days: 30
