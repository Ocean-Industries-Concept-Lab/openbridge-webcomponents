name: Playwright Tests
on:
  push:
    branches: [develop, stable]
  pull_request:
    branches: [develop, stable]
  permissions:
    contents: write
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-noble
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      LC_NUMERIC: en_US.UTF-8
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: packages/openbridge-webcomponents

      - name: Analyze openbridge-webcomponents
        run: npm run analyze
        working-directory: packages/openbridge-webcomponents

      - name: Update AR snapshots
        if: github.event_name == 'pull_request'
        run: npx vitest --project=storybook --update --maxWorkers=4 src/ar/
        working-directory: packages/openbridge-webcomponents

      - name: Commit updated AR snapshots
        if: github.event_name == 'pull_request'
        run: |
          git config --global user.name "thomsoren"
          git config --global user.email "tsorensen007@gmail.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git add packages/openbridge-webcomponents/__vis__/linux/__baselines__/ar/
          git diff --cached --quiet || git commit -m "fix: update AR snapshots from CI"
          git push origin HEAD:${{ github.head_ref }}

      - name: Serve Storybook and run tests
        run: npm run test-storybook
        working-directory: packages/openbridge-webcomponents

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: packages/openbridge-webcomponents/__vis__/linux/__diffs__
          retention-days: 30
