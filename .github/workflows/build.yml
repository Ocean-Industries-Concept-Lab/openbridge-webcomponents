# Simple workflow for deploying static content to GitHub Pages
name: Build

on:
  # Runs on pushes to any branch
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  # Single deploy job since we're just deploying
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Ensure native optional dependencies are installed
        shell: bash
        run: |
          ensure_native_package() {
            local package_name="$1"
            local native_package="$2"
            local package_version
            package_version=$(node -p "require('./node_modules/${package_name}/package.json').version")
            node -e "require('${native_package}')" || npm install --no-save "${native_package}@${package_version}"
          }

          ensure_native_package "rollup" "@rollup/rollup-linux-x64-gnu"
          ensure_native_package "oxc-resolver" "@oxc-resolver/binding-linux-x64-gnu"

      - name: Build translations
        run: cd packages/openbridge-webcomponents && npm run build:translations

      - name: Analyze openbridge-webcomponents
        run: cd packages/openbridge-webcomponents && npm run analyze

      - name: Typecheck openbridge-webcomponents
        run: cd packages/openbridge-webcomponents && npm run typecheck

      - name: Lint openbridge-webcomponents
        run: cd packages/openbridge-webcomponents && npm run lint

      - name: Check formatting openbridge-webcomponents
        run: cd packages/openbridge-webcomponents && npm run format:check

      - name: Fix imports openbridge-webcomponents
        run: cd packages/openbridge-webcomponents && npm run fix-imports:check

      - name: Check formatting vue-demo
        run: cd packages/vue-demo && npm run format:check
  test-browser:
    container:
      image: mcr.microsoft.com/playwright:v1.58.0-noble
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Ensure native optional dependencies are installed
        shell: bash
        run: |
          ensure_native_package() {
            local package_name="$1"
            local native_package="$2"
            local package_version
            package_version=$(node -p "require('./node_modules/${package_name}/package.json').version")
            node -e "require('${native_package}')" || npm install --no-save "${native_package}@${package_version}"
          }

          ensure_native_package "rollup" "@rollup/rollup-linux-x64-gnu"
          ensure_native_package "oxc-resolver" "@oxc-resolver/binding-linux-x64-gnu"

      - name: Run unit tests openbridge-webcomponents
        run: npm run test:browser
        working-directory: packages/openbridge-webcomponents
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Ensure native optional dependencies are installed
        shell: bash
        run: |
          ensure_native_package() {
            local package_name="$1"
            local native_package="$2"
            local package_version
            package_version=$(node -p "require('./node_modules/${package_name}/package.json').version")
            node -e "require('${native_package}')" || npm install --no-save "${native_package}@${package_version}"
          }

          ensure_native_package "rollup" "@rollup/rollup-linux-x64-gnu"
          ensure_native_package "oxc-resolver" "@oxc-resolver/binding-linux-x64-gnu"

      # During the npm release phase we update the version number.
      # This can give dependencies issues as the wrapper package are dependent on the core package.
      # Earlier the npm release action failed during "npm install" as the core package had a 
      # different version number than what was in package-lock.json.
      - name: Append timestamp to version, to simulate a new release
        working-directory: ./packages/openbridge-webcomponents
        run: |
          TIMESTAMP=$(date +"%Y%m%d%H%M%S")
          jq --arg TIMESTAMP "$TIMESTAMP" '.version = "0.0." + $TIMESTAMP' package.json > package.tmp.json && mv package.tmp.json package.json


      - name: Build openbridge-webcomponents
        run: cd packages/openbridge-webcomponents && npm run build:full

      - name: Install wrapper dependencies
        run: npm install

      - name: Ensure native optional dependencies are installed
        shell: bash
        run: |
          ensure_native_package() {
            local package_name="$1"
            local native_package="$2"
            local package_version
            package_version=$(node -p "require('./node_modules/${package_name}/package.json').version")
            node -e "require('${native_package}')" || npm install --no-save "${native_package}@${package_version}"
          }

          ensure_native_package "rollup" "@rollup/rollup-linux-x64-gnu"
          ensure_native_package "oxc-resolver" "@oxc-resolver/binding-linux-x64-gnu"

      - name: Build openbridge-webcomponents-vue
        run: cd packages/openbridge-webcomponents-vue && npm run build

      - name: Build vue-demo
        run: cd packages/vue-demo && npm run build

      - name: Build openbridge-webcomponents-react
        run: cd packages/openbridge-webcomponents-react && npm run build

      - name: Build openbridge-webcomponents-svelte
        run: cd packages/openbridge-webcomponents-svelte && npm run build

      - name: Build openbridge-webcomponents-ng
        run: cd packages/openbridge-webcomponents-ng && npm run build

      
