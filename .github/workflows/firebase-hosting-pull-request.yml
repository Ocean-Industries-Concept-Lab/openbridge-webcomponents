name: build_demo
"on": pull_request
jobs:
  build_demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build openbridge-webcomponents
        run: cd packages/openbridge-webcomponents && npm run build:full

      - name: Install wrapper dependencies
        run: npm install

      - name: Build openbridge-webcomponents-vue
        run: cd packages/openbridge-webcomponents-vue && npm run build

      - name: Build vue-demo
        run: cd packages/vue-demo && npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: vue-demo
          path: packages/vue-demo/dist/
  build_storybook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build storybook
        run: cd packages/openbridge-webcomponents && npm run analyze && npm run build-storybook
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - uses: actions/upload-artifact@v4
        with:
          name: storybook
          path: packages/openbridge-webcomponents/storybook-static/
  store_pr_number:
    runs-on: ubuntu-latest
    steps:
      - name: Save PR number
        run: |
          mkdir -p ./pr
          echo ${{ github.event.number }} > ./pr/NR

      - uses: actions/upload-artifact@v4
        with:
          name: pr
          path: pr/
