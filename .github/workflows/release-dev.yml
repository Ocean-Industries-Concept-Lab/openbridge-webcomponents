name: Publish to NPM

on:
  - push

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com/"
          scope: Ocean-Industries-Concept-Lab

      - name: Install dependencies
        run: npm install

      - name: Append timestamp to version
        working-directory: ./packages/openbridge-webcomponents
        run: |
          TIMESTAMP=$(date +"%Y%m%d%H%M%S")
          jq --arg TIMESTAMP "$TIMESTAMP" '.version = "0.0." + $TIMESTAMP' package.json > package.tmp.json && mv package.tmp.json package.json

      - name: Publish to GitHub Packages
        working-directory: ./packages/openbridge-webcomponents
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run build

      - name: Publish svelte wrapper to GitHub Packages
        working-directory: ./packages/openbridge-webcomponents-svelte
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install
          npm run build
          rm -rf node_modules/@oicl || true
          rm -rf node_modules/@ocean-industries-concept-lab || true
