name: Publish to NPM

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/"

      - name: Install dependencies
        run: npm install

      - name: Append timestamp to version
        working-directory: ./packages/openbridge-webcomponents
        run: |
          TIMESTAMP=$(date +"%Y%m%d%H%M%S")
          jq --arg TIMESTAMP "$TIMESTAMP" '.version = "0.0." + $TIMESTAMP' package.json > package.tmp.json && mv package.tmp.json package.json

      - name: Build and generate wrappers
        working-directory: ./packages/openbridge-webcomponents
        run: |
          npm run build:full

      - name: Install wrapper dependencies
        working-directory: .
        run: npm install

      - name: Publish core to NPM
        working-directory: ./packages/openbridge-webcomponents
        run: |
          npm publish --access public

      - name: Publish vue wrapper to NPM
        working-directory: ./packages/openbridge-webcomponents-vue
        run: |
          npm run build
          npm publish --access public

      - name: Publish svelte wrapper to NPM
        working-directory: ./packages/openbridge-webcomponents-svelte
        run: |
          npm run build
          npm publish --access public

      - name: Publish react wrapper to NPM
        working-directory: ./packages/openbridge-webcomponents-react
        run: |
          npm run build
          npm publish --access public

      - name: Publish angular wrapper to NPM
        working-directory: ./packages/openbridge-webcomponents-ng
        run: |
          npm publish --access public

