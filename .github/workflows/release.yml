name: Publish to NPM

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20" # Specify your Node.js version
          registry-url: "https://npm.pkg.github.com/"
          scope: Ocean-Industries-Concept-Lab

      - name: Install dependencies
        run: npm install

      - name: Append timestamp to version
        working-directory: ./packages/openbridge-webcomponents
        run: |
          TIMESTAMP=$(date +"%Y%m%d%H%M%S")
          npm version $(node -p "'0.0.${TIMESTAMP}'") --no-git-tag-version

      - name: Publish to GitHub Packages
        working-directory: ./packages/openbridge-webcomponents
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --access restricted

      - name: Publish react wrapper to GitHub Packages
        working-directory: ./packages/openbridge-webcomponents-react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -r node_modules/@oicl
          npm run build
          npm publish --access restricted

      - name: Publish vue wrapper to GitHub Packages
        working-directory: ./packages/openbridge-webcomponents-vue
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -r node_modules/@oicl
          npm run build
          npm publish --access restricted
