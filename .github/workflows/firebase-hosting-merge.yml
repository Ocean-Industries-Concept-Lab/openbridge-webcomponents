# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
"on":
  push:
    branches:
      - develop
      - build/demo-and-storybook-for-dev
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build openbridge-webcomponents
        run: cd packages/openbridge-webcomponents && npm run build:full

      - name: Install wrapper dependencies
        run: npm install

      - name: Build openbridge-webcomponents-vue
        run: cd packages/openbridge-webcomponents-vue && npm run build

      - name: Build vue-demo
        run: cd packages/vue-demo && npm run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_OPENBRIDGE_DEMO }}"
          channelId: next
          projectId: openbridge-demo
          entrypoint: "packages/vue-demo"
          expires: 30d
  build_and_deploy_storybook:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Analyze
        run: cd packages/openbridge-webcomponents && npm run analyze

      - name: Build storybook
        run: cd packages/openbridge-webcomponents && npm run build-storybook
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_OPENBRIDGE_DEMO }}"
          channelId: next
          projectId: openbridge-demo
          entrypoint: "packages/openbridge-webcomponents"
          expires: 30d

